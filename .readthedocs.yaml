# Read the Docs configuration for the Python `smooth` package.
#
# RTD reads this file from the repo root. The Sphinx source lives in
# python/docs/. To activate, sign in at https://readthedocs.org/, import
# the github.com/config-i1/smooth repo, and select the "Python" branch.
#
# The package itself is published at https://openforecast.org/smooth-py/
# (the same Sphinx site, deployed manually). RTD is a backup / mirror
# option — pointing the PyPI `Documentation` URL at openforecast.org keeps
# the production docs unchanged.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

sphinx:
  configuration: python/docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip

python:
  install:
    # Install the package itself so autodoc can import smooth.*. Building
    # the C++ extension on RTD's image needs CMake + ninja (already in the
    # ubuntu-22.04 image) and pybind11 (pulled in via the build deps).
    - method: pip
      path: python
      extra_requirements:
        - docs
