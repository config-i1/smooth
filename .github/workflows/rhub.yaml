# R-hub workflow. Adapted from r-hub/actions/blob/v1/workflows/rhub.yaml.
#
# Two changes from the canonical template:
#   * The default platform list is the canonical CRAN-submission matrix
#     (linux, windows, macos, macos-arm64) instead of the upstream
#     "linux,windows,macos-latest". ``macos-latest`` is a GitHub-runner
#     label, not an R-hub platform — the upstream default errored at the
#     setup step with "no such platform: macos-latest".
#   * A weekly schedule (Mondays, 02:00 UTC) runs the same matrix
#     automatically so the canonical R-hub check is never more than a
#     week stale even when no PR touches the package.
#
# The ``config`` workflow_dispatch input overrides the default platform
# list. Any comma-separated subset of:
#   linux, macos, macos-arm64, windows,
#   atlas, c23, clang-asan, clang-ubsan, clang16-22, donttest,
#   gcc-asan, gcc13-16, intel, lto, m1-san, mkl, nold, noremap,
#   nosuggests, rchk, ubuntu-clang, ubuntu-gcc12, ubuntu-next,
#   ubuntu-release, valgrind, vnu
# (see ``rhub::rhub_platforms()$name`` for the current list).

name: R-hub
run-name: "${{ github.event.inputs.id }}: ${{ github.event.inputs.name || format('Manually run by {0}', github.triggering_actor) }}"

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Comma-separated list of R-hub platforms. Leave empty to use the default CRAN-submission matrix.'
        type: string
        default: 'linux,windows,macos,macos-arm64'
      name:
        description: 'Run name. You can leave this empty.'
        type: string
      id:
        description: 'Unique ID. You can leave this empty.'
        type: string

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.rhub-setup.outputs.containers }}
      platforms: ${{ steps.rhub-setup.outputs.platforms }}

    steps:
    # NO NEED TO CHECKOUT HERE.
    # ``github.event.inputs.config`` is only populated on workflow_dispatch;
    # for the ``schedule`` trigger it's empty, so fall back to the default
    # canonical CRAN-submission matrix.
    - uses: r-hub/actions/setup@v1
      with:
        config: ${{ github.event.inputs.config || 'linux,windows,macos,macos-arm64' }}
      id: rhub-setup

  linux-containers:
    needs: setup
    if: ${{ needs.setup.outputs.containers != '[]' }}
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.containers) }}
    container:
      image: ${{ matrix.config.container }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/run-check@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}

  other-platforms:
    needs: setup
    if: ${{ needs.setup.outputs.platforms != '[]' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.setup.outputs.platforms) }}

    steps:
      - uses: r-hub/actions/checkout@v1
      - uses: r-hub/actions/setup-r@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/platform-info@v1
        with:
          token: ${{ secrets.RHUB_TOKEN }}
          job-config: ${{ matrix.config.job-config }}
      - uses: r-hub/actions/setup-deps@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
      - uses: r-hub/actions/run-check@v1
        with:
          job-config: ${{ matrix.config.job-config }}
          token: ${{ secrets.RHUB_TOKEN }}
