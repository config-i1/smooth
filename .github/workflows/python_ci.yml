name: Python Tests

on:
  pull_request:
    paths:
      - 'python/**'
      - '.github/workflows/python_ci.yml'
  workflow_dispatch:

# Opt every JavaScript action (including those bundled inside
# ``pypa/cibuildwheel@v3.1``, e.g. ``actions/setup-python@v5``) into
# the Node.js 24 runtime. GitHub deprecates Node.js 20 on 2026-06-02
# and removes it on 2026-09-16; this env var is the documented opt-in
# mechanism for the transition period.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff and mypy
        run: pip install ruff mypy

      - name: Run ruff linter
        run: ruff check python/src/smooth/

      - name: Run ruff formatter check
        run: ruff format --check python/src/smooth/

      - name: Run mypy
        working-directory: python
        run: mypy src/smooth

  build-and-test:
    name: Build & Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            python-version: "3.11"
            cibw-build: "cp311-manylinux*"
          - os: ubuntu-latest
            python-version: "3.12"
            cibw-build: "cp312-manylinux*"
          - os: ubuntu-latest
            python-version: "3.13"
            cibw-build: "cp313-manylinux*"
          - os: ubuntu-latest
            python-version: "3.14"
            cibw-build: "cp314-manylinux*"
          # macOS
          - os: macos-latest
            python-version: "3.11"
            cibw-build: "cp311-macosx*"
          # Windows — pin to windows-2025 (newer Server 2025 host, but
          # still a stable VS17 toolchain on GitHub's image) rather than
          # ``windows-latest``. ``windows-latest`` now rolls to a VS18 /
          # MSVC 14.51.36231 preview toolchain that openblas 0.3.33 (the
          # vcpkg port we pull in CIBW_BEFORE_ALL_WINDOWS) doesn't
          # compile under, killing the ``vcpkg install
          # openblas:x64-windows-release`` step.
          - os: windows-2025
            python-version: "3.11"
            cibw-build: "cp311-win_amd64"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build and test with cibuildwheel
        uses: pypa/cibuildwheel@v3.1
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.cibw-build }}
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y openblas-devel lapack-devel pkgconfig || \
            (apt-get update && apt-get install -y libopenblas-dev liblapack-dev pkg-config)
          CIBW_ENVIRONMENT_LINUX: PKG_CONFIG_PATH="/usr/lib64/pkgconfig:/usr/lib/pkgconfig"
          CIBW_BEFORE_ALL_MACOS: brew install openblas
          # Stop using vcpkg for BLAS/LAPACK on Windows. The vcpkg
          # ``openblas`` port does not bundle LAPACK kernels, so we
          # used to pair it with ``lapack-reference``, which in turn
          # needs a Fortran compiler. vcpkg's bundled Fortran
          # (``vcpkg-gfortran``) silently switched to LLVMFlang
          # somewhere in early 2025, and LLVMFlang 22.x doesn't build
          # ``lapack-reference 3.12.1`` — every recent CI run dies
          # there.
          #
          # OpenBLAS publishes pre-built Windows binaries on GitHub
          # that already include LAPACK in ``libopenblas.dll`` (no
          # Fortran compiler needed at build time). Download the
          # release zip, extract it, and let CMakeLists.txt pick it
          # up via ``OPENBLAS_HOME``. ``delvewheel`` then bundles the
          # OpenBLAS DLL and its MinGW runtime DLLs
          # (``libgfortran-5.dll``, ``libgcc_s_seh-1.dll``,
          # ``libwinpthread-1.dll``) into the wheel.
          CIBW_BEFORE_ALL_WINDOWS: >
            curl -L -o C:/openblas.zip
            https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.33/OpenBLAS-0.3.33-x64.zip
            && mkdir C:\openblas
            && tar -xf C:/openblas.zip -C C:/openblas
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_ARGS="-DOPENBLAS_HOME=C:/openblas"
            OPENBLAS_HOME=C:/openblas
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: delvewheel repair -w {dest_dir} {wheel} --add-path C:/openblas/bin
          CIBW_TEST_REQUIRES: pytest numpy
          CIBW_TEST_COMMAND: pytest {project}/python/tests -v --tb=short
