name: Publish to TestPyPI

# Manual flow for shipping a candidate release to TestPyPI. Step-by-step:
#
#   1. Trigger ``build-release-wheels.yml`` via its own
#      ``workflow_dispatch`` (or push a commit to a branch that runs it).
#   2. Wait for it to pass.
#   3. Open the successful run in the Actions tab; copy the numeric run
#      ID from the URL (``.../actions/runs/<RUN_ID>``).
#   4. Run this workflow via "Actions → Publish to TestPyPI → Run
#      workflow", pasting the run ID into the ``build-run-id`` input.
#
# The workflow downloads the artifacts produced by that specific build
# run and publishes them to TestPyPI via trusted publishing. No wheels
# are rebuilt.
on:
  workflow_dispatch:
    inputs:
      build-run-id:
        description: 'build-release-wheels.yml run ID to publish (find it in the URL of the build run)'
        required: true
        type: string

# Opt every JavaScript action into the Node.js 24 runtime — GitHub
# deprecates Node 20 on 2026-06-02 and removes it on 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/smooth
    permissions:
      id-token: write       # trusted publishing
      attestations: write   # PEP 740 / Sigstore attestations
      actions: read         # download-artifact across workflows

    steps:
      - name: Download wheel artifacts from build run ${{ inputs.build-run-id }}
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
          run-id: ${{ inputs.build-run-id }}
          github-token: ${{ github.token }}
          pattern: 'wheels-*'

      - name: Download sdist artifact from build run ${{ inputs.build-run-id }}
        uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist
          run-id: ${{ inputs.build-run-id }}
          github-token: ${{ github.token }}

      - name: List downloaded files
        run: ls -R dist/

      - name: Publish to TestPyPI (with PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
