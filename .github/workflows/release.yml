name: Publish release to PyPI

# Triggered when a GitHub release is published (i.e. you go to the
# repo's Releases page and click "Publish release" on a draft).
#
# The flow:
#   1. ``build-release-wheels.yml`` (manual) builds the wheels +
#      sdist and attaches them to a *draft* release with the tag the
#      user supplied. Re-running replaces the assets in place.
#   2. User reviews the draft in the GitHub UI, edits release notes
#      as desired, then clicks "Publish release".
#   3. That click creates the git tag at ``target_commitish`` AND
#      fires the ``release: published`` event that runs this
#      workflow.
#   4. This workflow downloads the assets that were just attached to
#      the now-published release and uploads them to PyPI with
#      PEP 740 attestations.
on:
  release:
    types: [published]

# Opt every JavaScript action into the Node.js 24 runtime — GitHub
# deprecates Node 20 on 2026-06-02 and removes it on 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/smooth
    permissions:
      id-token: write       # trusted publishing
      attestations: write   # PEP 740 / Sigstore attestations
      contents: read        # gh release download

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p dist
          # ``gh release download`` pulls every asset attached to
          # the release into ``dist/``. The wheels + sdist that
          # build-release-wheels.yml staged on the draft are the
          # exact files we publish to PyPI.
          gh release download "$TAG" --repo "${{ github.repository }}" --dir dist
          ls -R dist/

      - name: Publish to PyPI (with PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # SLSA Build Level 3 in-toto attestation per file,
          # signed via Sigstore using the runner's OIDC identity,
          # uploaded to PyPI alongside the wheel.
          attestations: true
          # Retry-safe: if the publish step gets re-run for any
          # reason, already-uploaded files are skipped instead of
          # blowing up the whole upload.
          skip-existing: true
