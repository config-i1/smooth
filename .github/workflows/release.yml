name: Release to PyPI

# Triggered automatically when ``build-release-wheels.yml`` completes
# successfully for a ``v*`` tag push. Downloads the wheels + sdist
# that the build workflow already produced (no rebuild) and publishes
# them to PyPI via trusted publishing, then creates a GitHub release
# with the wheels and sdist attached.
on:
  workflow_run:
    workflows: ["Build release wheels"]
    types: [completed]

jobs:
  publish:
    name: Publish to PyPI + create GitHub release
    runs-on: ubuntu-latest
    # Only fire when:
    #   1. The build workflow succeeded (filters out failed runs).
    #   2. The triggering event was a tag push (filters out manual
    #      ``workflow_dispatch`` runs of the build workflow — those
    #      are reserved for the TestPyPI flow).
    #   3. The branch / ref label looks like a release tag.
    # ``workflow_run.head_branch`` for a tag-push trigger equals the
    # tag name (e.g. ``v1.0.6``), which is what we publish under.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    environment:
      name: pypi
      url: https://pypi.org/p/smooth
    permissions:
      id-token: write     # trusted publishing
      actions: read       # download-artifact across workflows
      contents: write     # creating GitHub release

    steps:
      - name: Download wheel artifacts from the build run
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: 'wheels-*'

      - name: Download sdist artifact from the build run
        uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: List downloaded files
        run: ls -R dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ```bash
            pip install smooth
            ```

            Or install a specific wheel from this release:
            ```bash
            pip install <wheel-file-for-your-platform>
            ```

            ## What's Changed
            See the release notes below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
